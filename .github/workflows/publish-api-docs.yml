name: Publish API Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/openapi.yaml'
      - '.github/workflows/publish-api-docs.yml'
  pull_request:
    paths:
      - 'docs/openapi.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install redocly CLI
        run: npm install --no-save @redocly/cli@^2.29.0

      - name: Validate spec
        run: npx redocly lint docs/openapi.yaml --max-problems 1000

      - name: Render HTML
        run: |
          mkdir -p _site
          npx redocly build-docs docs/openapi.yaml -o _site/index.html

      - name: Upload artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
