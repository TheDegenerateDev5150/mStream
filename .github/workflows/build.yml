name: Build Server

on:
  push:
    tags:
      # Server release tags (e.g. v6.5.0). The `!*-DESKTOP_PLAYER`
      # exclusion prevents this workflow from re-firing when
      # build-webapp.yml creates its companion `<tag>-DESKTOP_PLAYER`
      # draft release — creating that release via `gh release create`
      # also creates the tag, which would otherwise match `*` and
      # spawn a duplicate Server build for every release.
      - '*'
      - '!*-DESKTOP_PLAYER'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install production dependencies
        run: npm install --omit=dev

      - name: Prune node_modules
        run: npx --yes clean-modules@^3 --yes

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes electron-builder@^26.7.0 --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
